[install]
linker = "isolated"
exact = true
saveTextLockfile = true

[test]
coverage = true
coverageSkipTestFiles = true
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageThreshold = { lines = 0.8, functions = 0.8, statements = 0.8 }
coveragePathIgnorePatterns = ["dist/**", "node_modules/**", "src/core/testing.ts", "examples/**/scenario.ts", "src/github/gh-cli-client.ts", "src/cli/context.ts", "src/cli/commands/export.ts", "src/cli/commands/import.ts", "src/**/test-helpers.ts", "src/server/schemas.ts", "src/server/serve.ts", "packages/**", "src/gossip/worker.ts", "src/cli/commands/gossip.ts"]

[run]
shell = "bun"
