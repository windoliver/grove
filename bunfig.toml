[install]
linker = "isolated"
exact = true
saveTextLockfile = true

[test]
coverage = true
coverageSkipTestFiles = true
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageThreshold = { lines = 0.8, functions = 0.8, statements = 0.8 }
coveragePathIgnorePatterns = ["dist/**", "node_modules/**", "src/core/testing.ts", "examples/**/scenario.ts", "src/github/gh-cli-client.ts", "src/cli/context.ts", "src/cli/commands/export.ts", "src/cli/commands/import.ts", "src/**/test-helpers.ts", "src/server/schemas.ts", "src/server/serve.ts", "packages/**", "src/gossip/worker.ts", "src/cli/commands/gossip.ts", "src/tui/main.ts", "src/tui/app.tsx", "src/tui/components/**", "src/tui/views/**", "src/tui/panels/**", "src/tui/hooks/use-keybindings.ts", "src/tui/hooks/use-polled-data.ts", "src/tui/hooks/use-navigation.ts", "src/tui/local-provider.ts", "src/tui/remote-provider.ts", "src/tui/nexus-provider.ts", "src/tui/provider-utils.ts", "src/tui/resolve-backend.ts", "src/tui/spawn-manager.ts", "src/tui/agents/**", "src/tui/opentui.d.ts", "src/tui/layout/edge-render.ts", "src/server/routes/diff.ts", "src/server/routes/contributions.ts", "src/server/routes/grove.ts", "src/nexus/vfs-paths.ts", "src/nexus/nexus-outcome-store.ts", "src/tui/provider.conformance.ts", "src/mcp/tools/outcomes.ts"]

[run]
shell = "bun"
