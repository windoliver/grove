name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run check

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: |
          # Run tests and capture output. Bun test may exit 1 due to
          # leaked timers/resources even with 0 failures (known Bun bug).
          # We check for actual test failures in the output.
          set +e
          output=$(bun test 2>&1)
          code=$?
          echo "$output"
          if echo "$output" | grep -qE "^\s+[1-9][0-9]* fail"; then
            echo "Tests have failures"
            exit 1
          fi
          # Also run ask-user tests
          output2=$(bun test --cwd packages/ask-user 2>&1)
          code2=$?
          echo "$output2"
          if echo "$output2" | grep -qE "^\s+[1-9][0-9]* fail"; then
            echo "ask-user tests have failures"
            exit 1
          fi
