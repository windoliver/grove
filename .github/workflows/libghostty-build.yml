name: Build libghostty-vt binaries

on:
  workflow_dispatch:
  push:
    paths:
      - "packages/libghostty/build.zig"
      - "packages/libghostty/build.zig.zon"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-macos
            platform_dir: darwin-arm64
            lib_ext: dylib
          - os: macos-13
            target: x86_64-macos
            platform_dir: darwin-x64
            lib_ext: dylib
          - os: ubuntu-latest
            target: x86_64-linux
            platform_dir: linux-x64
            lib_ext: so
          - os: ubuntu-latest
            target: aarch64-linux
            platform_dir: linux-arm64
            lib_ext: so

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/libghostty

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.0

      - name: Pin dependency hash
        run: zig fetch --save=ghostty "https://github.com/ghostty-org/ghostty/archive/600f59ae313adf377c0bf0d754fa258257f5f65f.tar.gz"

      - name: Build libghostty-vt
        run: zig build lib-vt -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Copy binary to platforms/
        run: |
          mkdir -p platforms/${{ matrix.platform_dir }}
          cp zig-out/lib/libghostty-vt.${{ matrix.lib_ext }} \
             platforms/${{ matrix.platform_dir }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libghostty-vt-${{ matrix.platform_dir }}
          path: packages/libghostty/platforms/${{ matrix.platform_dir }}/libghostty-vt.${{ matrix.lib_ext }}

      - name: Upload updated build.zig.zon (with hash)
        uses: actions/upload-artifact@v4
        with:
          name: build-zig-zon-${{ matrix.platform_dir }}
          path: packages/libghostty/build.zig.zon

  # After all platform builds, commit binaries + pinned hash back to the branch
  commit-binaries:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform binaries
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Place binaries in platforms/
        run: |
          for dir in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            src="downloaded-artifacts/libghostty-vt-${dir}"
            if [ -d "$src" ]; then
              mkdir -p "packages/libghostty/platforms/${dir}"
              cp "$src"/* "packages/libghostty/platforms/${dir}/"
              # Remove .gitkeep placeholder now that real binary exists
              rm -f "packages/libghostty/platforms/${dir}/.gitkeep"
            fi
          done

      - name: Copy pinned build.zig.zon (with hash from zig fetch)
        run: |
          # Use the build.zig.zon from any platform build (hash is the same)
          for dir in downloaded-artifacts/build-zig-zon-*; do
            if [ -f "$dir/build.zig.zon" ]; then
              cp "$dir/build.zig.zon" packages/libghostty/build.zig.zon
              break
            fi
          done

      - name: List resulting binaries
        run: find packages/libghostty/platforms/ -type f ! -name ".gitkeep"

      - name: Commit and push binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/libghostty/platforms/ packages/libghostty/build.zig.zon
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No binary changes to commit"
          else
            git commit -m "ci: add prebuilt libghostty-vt binaries for all platforms

Built from Ghostty commit 600f59ae via .github/workflows/libghostty-build.yml.
Includes pinned dependency hash in build.zig.zon."
            git push
          fi
